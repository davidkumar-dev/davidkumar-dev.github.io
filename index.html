    // Intersection Observer Hook
    function useInView(options = {}) {
        const ref = useRef(null);
        const [isInView, setIsInView] = useState(false);
        useEffect(() => {
            const el = ref.current;
            if (!el) return;
            const observer = new IntersectionObserver(([entry]) => {
                if (entry.isIntersecting) {
                    setIsInView(true);
                    observer.unobserve(el);
                }
            }, { threshold: 0.1, ...options });
            observer.observe(el);
            return () => observer.unobserve(el);
        }, []);
        return [ref, isInView];
    }

    // Typing animation hook

        const [isDeleting, setIsDeleting] = useState(false);

        useEffect(() => {
            const current = words[wordIndex];
            let timeout;

            if (!isDeleting && text === current) {
                timeout = setTimeout(() => setIsDeleting(true), pauseTime);
            } else if (isDeleting && text === '') {
                setIsDeleting(false);
                setWordIndex((prev) => (prev + 1) % words.length);
            } else {
                timeout = setTimeout(() => {
                    setText(current.substring(0, text.length + (isDeleting ? -1 : 1)));
                }, isDeleting ? deletingSpeed : typingSpeed);
            }
            return () => clearTimeout(timeout);
        }, [text, isDeleting, wordIndex, words]);

        return text;
    }

    // ---- COMPONENTS ----

    function FloatingNav({ isDark, toggleTheme }) {
        const [visible, setVisible] = useState(false);
        useEffect(() => {
            const handleScroll = () => setVisible(window.scrollY > 600);
            window.addEventListener('scroll', handleScroll, { passive: true });
            return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        return (
            <nav className={`nav-float ${visible ? 'visible' : ''}`}>
                <div className="nav-inner">
                    <a href="#hero" className="nav-logo">DK<span>.</span></a>
                    <div className="nav-links">
                        <a href="#about" className="nav-link">About</a>
                        <a href="#projects" className="nav-link">Projects</a>
                        <a href="#contact" className="nav-link">Contact</a>
                        <button className="theme-toggle" onClick={toggleTheme} aria-label="Toggle theme">
                            {isDark ? <Icons.sun /> : <Icons.moon />}
                        </button>
                    </div>
                </div>
            </nav>
        );
    }

                        <a href="#projects" className="nav-link" style={{ fontSize: '0.8rem' }}>Projects</a>
                        <a href="#contact" className="nav-link" style={{ fontSize: '0.8rem' }}>Contact</a>
                        <button className="theme-toggle" onClick={toggleTheme} aria-label="Toggle theme">
                            {isDark ? <Icons.sun /> : <Icons.moon />}
                        </button>
                    </div>

                <div style={{ textAlign: 'center', zIndex: 1, padding: '0 24px' }}>

                            alt={PROFILE.name}

                            onError={(e) => {
                                e.target.style.display = 'none';
                                e.target.parentElement.style.display = 'none';
                            }}
                        />
                    </div>

                    <h1 style={{
                        fontSize: 'clamp(2.5rem, 6vw, 4rem)',
                        fontWeight: 800,
                        letterSpacing: '-0.03em',
                        marginBottom: 8,
                        lineHeight: 1.1,
                    }}>

                    <div style={{
                        fontFamily: "'JetBrains Mono', monospace",
                        fontSize: 'clamp(0.9rem, 2vw, 1.15rem)',
                        color: 'var(--accent-cyan)',
                        height: '1.6em',
                        marginBottom: 12,
                        fontWeight: 500,
                    }}>
                        {typedText}<span className="cursor-blink"></span>
                    </div>

                    <p style={{
                        fontSize: '0.95rem',
                        color: 'var(--text-secondary)',
                        marginBottom: 8,
                        fontWeight: 500,
                    }}>
                        {PROFILE.degree}
                    </p>
                    <p style={{
                        fontSize: '0.85rem',
                        color: 'var(--text-muted)',
                        marginBottom: 32,
                    }}>
                        {PROFILE.university}
                    </p>

                    <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginBottom: 60 }}>
                        <a href={PROFILE.github} target="_blank" rel="noopener noreferrer" className="social-icon" aria-label="GitHub">
                            <Icons.github />
                        </a>
                        <a href={PROFILE.linkedin} target="_blank" rel="noopener noreferrer" className="social-icon" aria-label="LinkedIn">
                            <Icons.linkedin />
                        </a>
                        <a href={`mailto:${PROFILE.email}`} className="social-icon" aria-label="Email">
                            <Icons.mail />
                        </a>
                    </div>

                    <a href="#about" className="scroll-indicator" style={{ color: 'var(--text-muted)', display: 'inline-block' }}>
                        <Icons.arrowDown />

    function AboutSection() {

                </div>

    function ProjectCard({ project, index, inView }) {

                    <div className={`fade-up ${inView ? 'visible' : ''}`}>
                        <div className="section-label">// projects</div>
                        <h2 className="section-title">What I've Built</h2>

                    <div style={{

                </div>
            </section>
        );
    }

    function ContactSection() {
        const [ref, inView] = useInView();

        return (
            <section id="contact" ref={ref} style={{ padding: '60px 0 100px' }}>
                <div className="glow-line" style={{ marginBottom: 80 }}></div>
                <div className="section-container" style={{ textAlign: 'center' }}>
                    <div className={`fade-up ${inView ? 'visible' : ''}`}>
                        <div className="section-label">// contact</div>
                        <h2 className="section-title">Let's Connect</h2>
                        <p style={{ color: 'var(--text-secondary)', fontSize: '0.95rem', maxWidth: 500, margin: '0 auto 32px', lineHeight: 1.7 }}>
                            Always happy to chat. Feel free to reach out.
                        </p>
                    </div>

                    <div className={`fade-up ${inView ? 'visible' : ''}`} style={{ display: 'flex', gap: 16, justifyContent: 'center', flexWrap: 'wrap', transitionDelay: '0.15s' }}>
                        <a href={`mailto:${PROFILE.email}`} className="btn-primary">
                            <Icons.mail /> {PROFILE.email}
                        </a>
                        <a href={PROFILE.github} target="_blank" rel="noopener noreferrer" className="btn-primary">
                            <Icons.github /> GitHub
                        </a>
                        <a href={PROFILE.linkedin} target="_blank" rel="noopener noreferrer" className="btn-primary">
                            <Icons.linkedin /> LinkedIn
                        </a>
                    </div>
                </div>
            </section>
        );
    }

    function Footer() {
        return (
            <footer style={{
                textAlign: 'center',
                padding: '32px 24px',
                borderTop: '1px solid var(--border-color)',
            }}>
                <p style={{
                    fontFamily: "'JetBrains Mono', monospace",
                    fontSize: '0.72rem',
                    color: 'var(--text-muted)',
                }}>
                    &copy; {new Date().getFullYear()} David Kumar
                </p>
            </footer>
        );
    }

    // ---- MAIN APP ----
    function App() {
        const [isDark, setIsDark] = useState(true);

        const toggleTheme = useCallback(() => {
            setIsDark(prev => !prev);
        }, []);

        useEffect(() => {
            document.body.className = isDark ? '' : 'light-mode';
        }, [isDark]);

        return (
            <>
                <FloatingNav isDark={isDark} toggleTheme={toggleTheme} />
                <HeroSection isDark={isDark} toggleTheme={toggleTheme} />
                <AboutSection />
                <ProjectsSection />
                <ContactSection />
                <Footer />
            </>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
    </script>
