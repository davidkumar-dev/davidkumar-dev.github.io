<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Kumar | Personal Portfolio</title>
    <meta name="description" content="David Kumar - Finance & Business Analytics at Ohio State. Building trading signals and doing quantitative research.">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-100: #000000;
            --bg-200: #0a0a0a;
            --bg-card: #111111;
            --bg-card-hover: #191919;
            --text-primary: #ededed;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent: #ededed;
            --accent-dim: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --radius: 12px;
        }

        .light-mode {
            --bg-100: #ffffff;
            --bg-200: #fafafa;
            --bg-card: #ffffff;
            --bg-card-hover: #fafafa;
            --text-primary: #171717;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent: #171717;
            --accent-dim: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.2);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-100);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        .hero-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }
        .hero-bg::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: radial-gradient(ellipse at 30% 40%, rgba(255, 255, 255, 0.03) 0%, transparent 55%),
                        radial-gradient(ellipse at 70% 20%, rgba(255, 255, 255, 0.015) 0%, transparent 50%);
            animation: drift 30s ease-in-out infinite;
        }
        .hero-bg::after {
            display: none;
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
        }

        .grid-pattern {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 64px 64px;
            z-index: 0;
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }
        .light-mode .grid-pattern {
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
        }

        .noise {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px;
        }

        .glow-line {
            height: 1px;
            background: var(--border);
        }

        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .glass-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }
        .light-mode .glass-card:hover {
            border-color: rgba(0, 0, 0, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        /* Spotlight effect */
        .glass-card .card-spotlight {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1;
        }
        .glass-card:hover .card-spotlight {
            opacity: 1;
        }

        /* Top edge highlight on hover */
        .glass-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            pointer-events: none;
            z-index: 2;
            transition: opacity 0.3s ease;
        }
        .glass-card:hover::after {
            opacity: 1;
        }

        .glass-card::before {
            display: none;
        }

        .tag-pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
            letter-spacing: 0.01em;
            border: 1px solid var(--border);
            color: var(--text-muted);
            background: transparent;
            transition: all 0.2s ease;
        }
        .tag-pill:hover {
            border-color: var(--border-hover);
            color: var(--text-secondary);
        }

        .tag-pill.algo-tag {
            border: 1px solid var(--border);
            color: var(--text-muted);
            background: transparent;
        }
        .tag-pill.algo-tag:hover {
            border-color: var(--border-hover);
            color: var(--text-secondary);
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            background: transparent;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-primary:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--accent-dim);
        }

        .contact-btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.82rem;
            background: var(--accent-dim);
        }
        .contact-btn:hover {
            background: var(--text-primary);
            border-color: var(--text-primary);
            color: var(--bg-100);
        }
        .light-mode .contact-btn:hover {
            background: var(--text-primary);
            color: var(--bg-100);
        }

        .nav-float {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-120%);
            z-index: 100;
            padding: 10px 28px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .nav-float.visible {
            transform: translateX(-50%) translateY(0);
        }
        .light-mode .nav-float {
            background: rgba(255, 255, 255, 0.8);
        }

        .nav-inner {
            display: flex;
            align-items: center;
            gap: 28px;
        }
        .nav-logo {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-decoration: none;
        }
        .nav-logo span { color: var(--text-muted); }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-link {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 400;
            transition: color 0.15s ease;
            position: relative;
        }
        .nav-link::after {
            display: none;
        }
        .nav-link:hover { color: var(--text-primary); }

        .theme-toggle {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            font-size: 0.9rem;
        }
        .theme-toggle:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .section-container {
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .project-image-wrapper {
            overflow: hidden;
            position: relative;
            margin: 0;
        }
        .project-image-wrapper img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            filter: brightness(0.85) saturate(0.9);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), filter 0.5s ease;
        }
        .glass-card:hover .project-image-wrapper img {
            transform: scale(1.03);
            filter: brightness(1) saturate(1);
        }
        .project-image-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to top, var(--bg-card) 0%, transparent 100%);
            pointer-events: none;
        }

        @keyframes bounce-down {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(8px); opacity: 0.6; }
        }
        .scroll-indicator {
            animation: bounce-down 2.5s ease-in-out infinite;
        }

        .profile-glow {
            position: relative;
            display: inline-block;
        }
        .profile-glow::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.03));
            z-index: -1;
        }
        .light-mode .profile-glow::before {
            background: linear-gradient(135deg, rgba(0,0,0,0.1), rgba(0,0,0,0.03));
        }
        .profile-glow::after {
            display: none;
        }
        .profile-glow img {
            display: block;
            border-radius: 50%;
            border: 2px solid var(--border);
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .social-icon:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--accent-dim);
        }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .section-title {
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.04em;
            line-height: 1.1;
            background: linear-gradient(180deg, var(--text-primary) 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            filter: blur(6px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                        filter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }

        .two-col-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        @media (max-width: 900px) {
            .two-col-grid {
                grid-template-columns: 1fr;
                gap: 56px;
            }
        }
        @media (max-width: 768px) {
            .nav-links { gap: 16px; }
            .nav-link { font-size: 0.75rem; }
            .nav-float { padding: 8px 16px; }
            .section-container { padding: 0 20px; }
        }

        .footer-main {
            text-align: center;
            padding: 64px 24px 48px;
            border-top: 1px solid var(--border);
            position: relative;
        }
        .footer-main::before {
            display: none;
        }

        @media (prefers-reduced-motion: reduce) {
            .fade-up { filter: none; transition-duration: 0.01s; }
            .scroll-indicator { animation: none; }
            .hero-bg::before { animation: none; }
            .network-canvas { display: none; }
        }

        .network-canvas {
            position: absolute;
            inset: 0;
            z-index: 0;
            -webkit-mask-image: linear-gradient(to bottom, black 30%, transparent 85%);
            mask-image: linear-gradient(to bottom, black 30%, transparent 85%);
        }

        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), rgba(255,255,255,0.4));
            z-index: 9998;
            transform-origin: left;
            will-change: transform;
        }
        .light-mode .scroll-progress {
            background: linear-gradient(90deg, rgba(0,0,0,0.6), rgba(0,0,0,0.3));
        }

        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            pointer-events: none;
            will-change: transform;
        }
        .aurora-blob-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
            top: 10%;
            left: 20%;
            animation: aurora-float-1 25s ease-in-out infinite;
        }
        .aurora-blob-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            top: 30%;
            right: 15%;
            animation: aurora-float-2 30s ease-in-out infinite;
        }
        .aurora-blob-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.025) 0%, transparent 70%);
            bottom: 20%;
            left: 40%;
            animation: aurora-float-3 20s ease-in-out infinite;
        }
        @keyframes aurora-float-1 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(60px, -40px); }
            66% { transform: translate(-30px, 50px); }
        }
        @keyframes aurora-float-2 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-50px, 30px); }
            66% { transform: translate(40px, -20px); }
        }
        @keyframes aurora-float-3 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -50px); }
            66% { transform: translate(-40px, 20px); }
        }
        .light-mode .aurora-blob { opacity: 0.15; }
        .light-mode .aurora-blob-1 { background: radial-gradient(circle, rgba(0,0,0,0.03) 0%, transparent 70%); }
        .light-mode .aurora-blob-2 { background: radial-gradient(circle, rgba(0,0,0,0.02) 0%, transparent 70%); }
        .light-mode .aurora-blob-3 { background: radial-gradient(circle, rgba(0,0,0,0.015) 0%, transparent 70%); }

        .email-giant {
            font-size: clamp(1.5rem, 4vw, 2.8rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            text-decoration: none;
            color: var(--text-primary);
            position: relative;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .email-giant::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--text-primary);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .email-giant:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        .email-giant:hover {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div id="root"></div>

    <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PROFILE = {
        name: "David Kumar",
        subtitle: "Personal Portfolio",
        university: "The Ohio State University - Fisher College of Business",
        degree: "B.S. Finance · Business Analytics Minor",
        bio: "Sophomore Finance major at Ohio State with a Business Analytics minor.",
        image: "images/headshot.jpeg",
        github: "https://github.com/davidkumar-dev",
        linkedin: "https://linkedin.com/in/dkumar10",
        email: "kumar.1189@osu.edu",
    };

    const ALGOS = [
        {
            title: "Kalman Momentum - SPY Trading Signal",
            description: "A long-only trading signal for SPY using 15-minute data. Takes raw price data, smooths it with a Kalman filter to get velocity and acceleration, and enters long when both are positive (price going up and speeding up). Sizes bets based on how strong the momentum is relative to recent bars. Tested across 233 trades over 8 years of out-of-sample data. 1.13 Sharpe ratio, and statistically significant at p=0.0002 against 10,000 random entry simulations.",
            image: "images/kalman_momentum.png",
            github: "https://github.com/davidkumar-dev/kalman-momentum-spy",
            tags: ["Kalman Filter", "Python", "Monte Carlo", "SPY"],
        },
    ];

    const RESEARCH = [
        {
            title: "Stock Correlation Network Analysis",
            description: "Looked at how S&P 100 stocks move together across six different market periods from 2018 to 2025. Built correlation networks to see how the structure changes. During COVID, almost everything moved together (3,228 connections). During the AI boom, stocks spread apart and moved more independently (121 connections).",
            image: "images/network_analysis.png",
            github: "https://github.com/davidkumar-dev/stock-correlation-network",
            tags: ["Network Analysis", "Python", "NumPy", "NetworkX"],
        },
        {
            title: "Monte Carlo Options Pricing",
            description: "Built a Monte Carlo framework to price options using both standard and stochastic volatility models. Priced path-dependent options like Asian and barrier options, ran risk analysis with VaR and CVaR, and cut variance by 34% using antithetic variates.",
            image: "images/monte_carlo.png",
            github: "https://github.com/davidkumar-dev/monte-carlo-stochastic-volatility",
            tags: ["Monte Carlo", "Heston Model", "Options Pricing"],
        },
        {
            title: "Volatility Surface Modeling",
            description: "Built a 3D visualization of how implied volatility changes across different strike prices and expiration dates. Used real market data to map out the volatility smile and see how it shifts over time.",
            image: "images/3d_vol.png",
            github: "https://github.com/davidkumar-dev/volatility-surface-modeling",
            tags: ["Implied Volatility", "3D Visualization", "Market Data"],
        },
        {
            title: "American Options Pricing",
            description: "Priced American options using a binomial tree model. Analyzed where early exercise makes sense and how the pricing converges as you add more time steps to the tree.",
            image: "images/boundary.png",
            github: "https://github.com/davidkumar-dev/american-options-binomial",
            tags: ["Binomial Trees", "American Options", "Numerical Methods"],
        },
        {
            title: "European Options Pricing",
            description: "Implemented Black-Scholes from scratch with Greeks calculation and an implied volatility solver. Validated pricing against real market data to make sure the numbers actually matched.",

            github: "https://github.com/davidkumar-dev/options-pricing-foundation",
            tags: ["Black-Scholes", "Greeks", "Implied Volatility"],
        },
    ];

    // SVG Icons
    const Icons = {
        github: () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
            </svg>
        ),
        linkedin: () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
            </svg>
        ),
        mail: () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
        ),
        externalLink: () => (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
        ),

    // Network canvas background
    function NetworkCanvas({ isDark }) {
        const canvasRef = useRef(null);
        const animRef = useRef(null);
        const nodesRef = useRef([]);
        const mouseRef = useRef({ x: -1000, y: -1000 });

        useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;

            const resize = () => {
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                canvas.style.width = rect.width + 'px';
                canvas.style.height = rect.height + 'px';
                ctx.scale(dpr, dpr);
            };
            resize();
            window.addEventListener('resize', resize);

            const nodeCount = window.innerWidth < 768 ? 20 : 40;
            const w = () => canvas.width / dpr;
            const h = () => canvas.height / dpr;

            if (nodesRef.current.length === 0) {
                for (let i = 0; i < nodeCount; i++) {
                    nodesRef.current.push({
                        x: Math.random() * w(),
                        y: Math.random() * h(),
                        vx: (Math.random() - 0.5) * 0.15,
                        vy: (Math.random() - 0.5) * 0.15,
                        r: 0.8 + Math.random() * 1.2,
                    });
                }
            }

            const handleMouse = (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseRef.current = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            };
            const handleMouseLeave = () => {
                mouseRef.current = { x: -1000, y: -1000 };
            };
            canvas.addEventListener('mousemove', handleMouse);
            canvas.addEventListener('mouseleave', handleMouseLeave);

            const maxDist = 160;
            const draw = () => {
                const cw = w(), ch = h();
                ctx.clearRect(0, 0, cw, ch);
                const nodes = nodesRef.current;
                const mx = mouseRef.current.x;
                const my = mouseRef.current.y;

                for (const n of nodes) {
                    n.x += n.vx;
                    n.y += n.vy;
                    if (n.x < 0 || n.x > cw) n.vx *= -1;
                    if (n.y < 0 || n.y > ch) n.vy *= -1;
                    n.x = Math.max(0, Math.min(cw, n.x));
                    n.y = Math.max(0, Math.min(ch, n.y));
                }

                // connections
                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i + 1; j < nodes.length; j++) {
                        const dx = nodes[i].x - nodes[j].x;
                        const dy = nodes[i].y - nodes[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < maxDist) {
                            const alpha = (1 - dist / maxDist) * 0.06;
                            ctx.strokeStyle = isDark
                                ? `rgba(255, 255, 255, ${alpha})`
                                : `rgba(0, 0, 0, ${alpha})`;
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(nodes[i].x, nodes[i].y);
                            ctx.lineTo(nodes[j].x, nodes[j].y);
                            ctx.stroke();
                        }
                    }
                }

                // mouse connections
                for (const n of nodes) {
                    const dx = n.x - mx;
                    const dy = n.y - my;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 200) {
                        const alpha = (1 - dist / 200) * 0.12;
                        ctx.strokeStyle = isDark
                            ? `rgba(255, 255, 255, ${alpha})`
                            : `rgba(0, 0, 0, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(n.x, n.y);
                        ctx.lineTo(mx, my);
                        ctx.stroke();
                    }
                }

                // nodes
                for (const n of nodes) {
                    ctx.fillStyle = isDark
                        ? 'rgba(255, 255, 255, 0.15)'
                        : 'rgba(0, 0, 0, 0.1)';
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
                    ctx.fill();
                }

                animRef.current = requestAnimationFrame(draw);
            };
            animRef.current = requestAnimationFrame(draw);

            return () => {
                cancelAnimationFrame(animRef.current);
                window.removeEventListener('resize', resize);
                canvas.removeEventListener('mousemove', handleMouse);
                canvas.removeEventListener('mouseleave', handleMouseLeave);
            };
        }, [isDark]);

        return <canvas ref={canvasRef} className="network-canvas" />;
    }

    // Text scramble effect
    function useTextScramble(finalText, startDelay = 500) {
        const [display, setDisplay] = useState('');
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&';
        const started = useRef(false);

        useEffect(() => {
            if (started.current) return;
            started.current = true;
            let frame = 0;
            const totalFrames = 20;
            const timer = setTimeout(() => {
                const interval = setInterval(() => {
                    frame++;
                    const progress = frame / totalFrames;
                    const revealed = Math.floor(progress * finalText.length);
                    let result = '';
                    for (let i = 0; i < finalText.length; i++) {
                        if (finalText[i] === ' ') {
                            result += ' ';
                        } else if (i < revealed) {
                            result += finalText[i];
                        } else {
                            result += chars[Math.floor(Math.random() * chars.length)];
                        }
                    }
                    setDisplay(result);
                    if (frame >= totalFrames) {
                        clearInterval(interval);
                        setDisplay(finalText);
                    }
                }, 50);
            }, startDelay);
            return () => clearTimeout(timer);
        }, [finalText, startDelay]);

        return display;
    }

    // Magnetic button effect
    function useMagnetic(strength = 0.3) {
        const ref = useRef(null);
        const [offset, setOffset] = useState({ x: 0, y: 0 });

        const handleMouseMove = useCallback((e) => {
            const el = ref.current;
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dx = (e.clientX - centerX) * strength;
            const dy = (e.clientY - centerY) * strength;
            setOffset({ x: dx, y: dy });
        }, [strength]);

        const handleMouseLeave = useCallback(() => {
            setOffset({ x: 0, y: 0 });
        }, []);

        const style = {
            transform: `translate(${offset.x}px, ${offset.y}px)`,
            transition: offset.x === 0 ? 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)' : 'transform 0.1s ease-out',
        };

        return { ref, style, handleMouseMove, handleMouseLeave };
    }

    function useInView(options = {}) {
        const ref = useRef(null);
        const [isInView, setIsInView] = useState(false);
        useEffect(() => {
            const el = ref.current;
            if (!el) return;
            const observer = new IntersectionObserver(([entry]) => {
                if (entry.isIntersecting) {
                    setIsInView(true);
                    observer.unobserve(el);
                }
            }, { threshold: 0.1, ...options });
            observer.observe(el);
            return () => observer.unobserve(el);
        }, []);
        return [ref, isInView];
    }
