            inset: 0;
            overflow: hidden;

            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: radial-gradient(ellipse at 20% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),

                        radial-gradient(ellipse at 60% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);

        @keyframes drift {

            z-index: 0;

    // 3D Tilt effect hook
    function useTilt(intensity = 15) {
        const ref = useRef(null);
        const [style, setStyle] = useState({
            transform: 'perspective(800px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)',
            transition: 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)',
        });

        const handleMouseMove = useCallback((e) => {
            const el = ref.current;
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -intensity;
            const rotateY = ((x - centerX) / centerX) * intensity;
            setStyle({
                transform: `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02,1.02,1.02)`,
                transition: 'transform 0.1s ease-out',
            });
        }, [intensity]);

        const handleMouseLeave = useCallback(() => {
            setStyle({
                transform: 'perspective(800px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)',
                transition: 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)',
            });
        }, []);

        return { ref, style, handleMouseMove, handleMouseLeave };
    }

    // Text scramble effect
    function useTextScramble(finalText, startDelay = 500) {
        const [display, setDisplay] = useState('');
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&';
        const started = useRef(false);

        useEffect(() => {
            if (started.current) return;
            started.current = true;
            let frame = 0;
            const totalFrames = 20;
            const timer = setTimeout(() => {
                const interval = setInterval(() => {
                    frame++;
                    const progress = frame / totalFrames;
                    const revealed = Math.floor(progress * finalText.length);
                    let result = '';
                    for (let i = 0; i < finalText.length; i++) {
                        if (finalText[i] === ' ') {
                            result += ' ';
                        } else if (i < revealed) {
                            result += finalText[i];
                        } else {
                            result += chars[Math.floor(Math.random() * chars.length)];
                        }
                    }
                    setDisplay(result);
                    if (frame >= totalFrames) {
                        clearInterval(interval);
                        setDisplay(finalText);
                    }
                }, 50);
            }, startDelay);
            return () => clearTimeout(timer);
        }, [finalText, startDelay]);

        return display;
    }

    // Magnetic button effect
    function useMagnetic(strength = 0.3) {
        const ref = useRef(null);
        const [offset, setOffset] = useState({ x: 0, y: 0 });

        const handleMouseMove = useCallback((e) => {
            const el = ref.current;
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dx = (e.clientX - centerX) * strength;
            const dy = (e.clientY - centerY) * strength;
            setOffset({ x: dx, y: dy });
        }, [strength]);

        const handleMouseLeave = useCallback(() => {
            setOffset({ x: 0, y: 0 });
        }, []);

        const style = {
            transform: `translate(${offset.x}px, ${offset.y}px)`,
            transition: offset.x === 0 ? 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)' : 'transform 0.1s ease-out',
        };

        return { ref, style, handleMouseMove, handleMouseLeave };
    }

    function useInView(options = {}) {
        const ref = useRef(null);
        const [isInView, setIsInView] = useState(false);
        useEffect(() => {
            const el = ref.current;
            if (!el) return;
            const observer = new IntersectionObserver(([entry]) => {
                if (entry.isIntersecting) {
                    setIsInView(true);
                    observer.unobserve(el);
                }
            }, { threshold: 0.1, ...options });
            observer.observe(el);
            return () => observer.unobserve(el);
        }, []);
        return [ref, isInView];
    }
